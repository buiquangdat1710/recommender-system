<!DOCTYPE html>
<html>
<head>
  <title>Đăng nhập – Netflix Recommender</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e50914;
      --red-dark: #b20710;
      --bg: #0a0a0a;
      --glass: rgba(15,15,15,0.85);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Cinematic background */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(229,9,20,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 100%, rgba(229,9,20,0.10) 0%, transparent 55%),
        linear-gradient(160deg, #0a0a0a 0%, #111 50%, #0d0d0d 100%);
    }

    /* Noise grain overlay */
    .bg-layer::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    /* Decorative film strips */
    .film-strip {
      position: fixed;
      top: 0; bottom: 0;
      width: 48px;
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 0.06;
      pointer-events: none;
    }
    .film-strip.left { left: 0; }
    .film-strip.right { right: 0; }
    .film-hole {
      flex: 1;
      border-top: 2px solid white;
      border-bottom: 2px solid white;
      border-left: 8px solid white;
      border-right: 8px solid white;
      background: transparent;
      min-height: 32px;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      animation: floatUp var(--dur, 8s) var(--delay, 0s) infinite ease-in-out;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      20%  { opacity: 0.15; }
      80%  { opacity: 0.05; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
    }

    /* Page layout */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Logo */
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 4px;
      color: var(--red);
      margin-bottom: 8px;
      text-shadow: 0 0 40px rgba(229,9,20,0.6);
      animation: fadeDown 0.6s ease both;
    }
    .logo-sub {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    /* Auth card */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 48px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(229,9,20,0.08),
        0 32px 80px rgba(0,0,0,0.8),
        0 0 120px rgba(229,9,20,0.06);
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .auth-card h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      letter-spacing: -0.3px;
    }

    /* Error */
    .error-banner {
      background: rgba(229,9,20,0.12);
      border: 1px solid rgba(229,9,20,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #ff6b6b;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Fields */
    .field-group {
      position: relative;
      margin-bottom: 16px;
    }
    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .field-group:focus-within label { color: var(--red); }

    .field-group input {
      width: 100%;
      height: 50px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .field-group input::placeholder { color: #555; }
    .field-group input:focus {
      border-color: var(--red);
      background: rgba(229,9,20,0.05);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.1);
    }

    /* Button */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--red);
      border: none;
      border-radius: 8px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }
    .btn-submit:hover { background: var(--red-dark); box-shadow: 0 8px 32px rgba(229,9,20,0.4); }
    .btn-submit:hover::after { transform: translateX(100%); }
    .btn-submit:active { transform: scale(0.98); }

    /* Footer link */
    .auth-footer {
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .auth-footer a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .auth-footer a:hover { color: var(--red); border-color: var(--red); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 4px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <!-- Film strips -->
  <div class="film-strip left">
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
  </div>
  <div class="film-strip right">
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
  </div>

  <!-- Floating particles -->
  <div class="particle" style="width:4px;height:4px;left:20%;bottom:-10px;--dur:10s;--delay:0s;"></div>
  <div class="particle" style="width:3px;height:3px;left:45%;bottom:-10px;--dur:14s;--delay:3s;"></div>
  <div class="particle" style="width:5px;height:5px;left:70%;bottom:-10px;--dur:9s;--delay:1.5s;"></div>
  <div class="particle" style="width:2px;height:2px;left:85%;bottom:-10px;--dur:12s;--delay:5s;"></div>

  <div class="page">
    <div class="logo">🎬 Netflix Recommender</div>
    <div class="logo-sub">Discover · Watch · Enjoy</div>

    <div class="auth-card">
      <h2>Đăng nhập</h2>

      <!-- {% if error %} -->
      <!-- <div class="error-banner">⚠ {{ error }}</div> -->
      <!-- {% endif %} -->

      <!-- Demo error: -->
      <!-- <div class="error-banner">⚠ Tên đăng nhập hoặc mật khẩu không đúng.</div> -->

      <form method="POST">
        <div class="field-group">
          <label>Tên đăng nhập</label>
          <input type="text" name="username" placeholder="Nhập username..." required autocomplete="username">
        </div>
        <div class="field-group">
          <label>Mật khẩu</label>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Đăng nhập →</button>
      </form>

      <div class="divider">HOẶC</div>
      <div class="auth-footer">
        Chưa có tài khoản? <a href="{{ url_for('register') }}">Tạo tài khoản ngay</a>
      </div>
    </div>
  </div>
</body>
</html>
